name: AI Bootstrap (Metadata)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit per index'
        required: true
        default: '20'

permissions:
  contents: write

jobs:
  bootstrap-metadata:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run AI Bootstrap
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python backend/bootstrap_metadata.py
      
    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/stock_metadata.json
        git diff --staged --quiet || (git commit -m "Auto-update stock metadata (AI Bootstrap): $(date +'%Y-%m-%d %H:%M')" && git push)
